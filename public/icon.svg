<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Luxury Steps Boutique app icon.
    Designed for "maskable any" PWA usage — the meaningful content sits inside
    a 410×410 safe zone (≈80% of the canvas) so OS rounding/cropping never
    chops the monogram on Android or iOS.
  -->
  <defs>
    <!-- Scarlet → Deep Ruby gradient backdrop -->
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%"   stop-color="#C8102E"/>
      <stop offset="55%"  stop-color="#A2101F"/>
      <stop offset="100%" stop-color="#7B1818"/>
    </radialGradient>

    <!-- Rose-gold gradient for the monogram letters -->
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F2DDC3"/>
      <stop offset="50%"  stop-color="#C9956C"/>
      <stop offset="100%" stop-color="#A87850"/>
    </linearGradient>

    <!-- Subtle inner-glow filter for depth -->
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full bleed background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Soft vignette in the corners for richness -->
  <rect x="0" y="0" width="512" height="512" fill="black" opacity="0.06"
        style="mix-blend-mode: multiply"/>

  <!-- Decorative double ring — sits inside the safe zone -->
  <circle cx="256" cy="256" r="186" fill="none"
          stroke="url(#goldStroke)" stroke-width="1.5" opacity="0.45"/>
  <circle cx="256" cy="256" r="172" fill="none"
          stroke="url(#goldStroke)" stroke-width="0.75" opacity="0.35"/>

  <!-- Top eyebrow micro-mark (small diamond on a thin line) -->
  <g opacity="0.85">
    <line x1="200" y1="116" x2="312" y2="116"
          stroke="url(#goldStroke)" stroke-width="1.2"/>
    <path d="M256 110 L260 116 L256 122 L252 116 Z"
          fill="url(#goldStroke)"/>
  </g>

  <!-- LSB monogram — cormorant-style serif feel via Times -->
  <g filter="url(#innerGlow)">
    <text x="256" y="296"
          font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif"
          font-style="italic"
          font-weight="700"
          font-size="180"
          letter-spacing="6"
          text-anchor="middle"
          fill="url(#goldStroke)">L<tspan dx="0">·</tspan>S<tspan dx="0">·</tspan>B</text>
  </g>

  <!-- Bottom wordmark — small uppercase sans, tight tracking -->
  <text x="256" y="372"
        font-family="'Jost', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="22"
        letter-spacing="11"
        text-anchor="middle"
        fill="#FFFAF8"
        opacity="0.92">BOUTIQUE</text>

  <!-- Bottom hairline + accent dot -->
  <line x1="206" y1="402" x2="306" y2="402"
        stroke="url(#goldStroke)" stroke-width="0.9" opacity="0.55"/>
  <circle cx="256" cy="402" r="2.2" fill="url(#goldStroke)"/>

  <!-- Tiny stiletto silhouette as a subtle brand cue -->
  <g transform="translate(256 432)" opacity="0.7">
    <path d="M-22 0
             C -22 -3, -18 -6, -10 -6
             L 18 -6
             C 22 -6, 22 -2, 20 0
             L 6 0
             L 2 8
             L -2 4
             Z"
          fill="url(#goldStroke)"/>
    <line x1="6" y1="0" x2="9" y2="9"
          stroke="url(#goldStroke)" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
